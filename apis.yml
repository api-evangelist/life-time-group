aid: life-time-group
name: Life Time Group Holdings
description: >-
  Life Time Group Holdings is an American health and wellness company operating
  large-format athletic resort destinations across the United States and
  Canada. The company offers fitness facilities, personal training, group
  classes, aquatics, indoor and outdoor sports, spa services, and healthy
  living programs in premium resort-style facilities, plus the Life Time app
  for members. Life Time does not currently publish a public developer API or
  developer portal.
